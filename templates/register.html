{% extends "base.html" %}
{% block title %}Create Account — The Golden Lantern{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🔥</div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join The Golden Lantern</p>
    <form method="post">
      <div class="field"><label>Name</label><input type="text" name="name" placeholder="Your full name" required></div>
      <div class="field"><label>Email</label><input type="email" name="email" placeholder="you@email.com" required></div>
      <div class="field"><label>Password</label><input type="password" name="password" placeholder="Choose a password" required></div>
      <button type="submit" class="btn-primary btn-block">Create Account</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in →</a></div>
    <div class="auth-footer-back"><a href="{{ url_for('index') }}" class="btn-ghost btn-sm">← Back to Home</a></div>
  </div>
</div>
{% endblock %}
