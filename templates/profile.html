{% extends "base.html" %}
{% block title %}My Profile — The Golden Lantern{% endblock %}
{% block content %}
<div class="page-hero page-hero-sm"><h1>My Profile</h1></div>
<div class="profile-page">
  <div class="profile-card">
    <div class="profile-avatar">{{ cust.name[0].upper() }}</div>
    <div class="profile-name">{{ cust.name }}</div>
    <div class="profile-email">{{ cust.email }}</div>
    <div class="profile-joined">Member since {{ cust.joined[:10] }}</div>
  </div>

  <div class="form-card">
    <h3>Update Info</h3>
    <form method="post">
      <input type="hidden" name="action" value="update_info">
      <div class="field"><label>Name</label><input type="text" name="name" value="{{ cust.name }}" required></div>
      <div class="field"><label>Email</label><input type="email" name="email" value="{{ cust.email }}" required></div>
      <button type="submit" class="btn-primary">Save Changes</button>
    </form>
  </div>

  <div class="form-card">
    <h3>Change Password</h3>
    <form method="post">
      <input type="hidden" name="action" value="change_password">
      <div class="field"><label>Current Password</label><input type="password" name="old_password" placeholder="Current password" required></div>
      <div class="field"><label>New Password</label><input type="password" name="new_password" placeholder="New password" required></div>
      <button type="submit" class="btn-primary">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
